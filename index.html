<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VLM Parse</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: #fff; }
  p.sub { font-size: 13px; color: #666; margin-bottom: 32px; }
  #drop-zone { width: 100%; max-width: 680px; border: 1.5px dashed #333; border-radius: 12px; padding: 48px 24px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; margin-bottom: 24px; }
  #drop-zone.active { border-color: #555; background: #1a1a1a; }
  #drop-zone.has-image { border-style: solid; border-color: #333; padding: 0; overflow: hidden; }
  #drop-zone img { width: 100%; border-radius: 10px; display: block; }
  .hint { font-size: 13px; color: #555; }
  .hint span { color: #888; }
  #result-box { width: 100%; max-width: 680px; display: none; }
  #result-box label { font-size: 12px; color: #555; display: block; margin-bottom: 8px; }
  #result { width: 100%; background: #1a1a1a; border: 0.5px solid #2a2a2a; border-radius: 10px; padding: 16px; font-size: 13px; font-family: 'SF Mono', Monaco, monospace; color: #e0e0e0; min-height: 120px; resize: vertical; line-height: 1.6; }
  .actions { display: flex; gap: 10px; margin-top: 12px; }
  button { padding: 8px 18px; border-radius: 8px; border: 0.5px solid #333; background: transparent; color: #e0e0e0; font-size: 13px; cursor: pointer; transition: background 0.15s; }
  button:hover { background: #1a1a1a; }
  button.primary { background: #e0e0e0; color: #0f0f0f; border-color: transparent; }
  button.primary:hover { background: #ccc; }
  #status { font-size: 12px; color: #555; margin-top: 16px; }
  #status.loading { color: #888; }
  #status.done { color: #4caf82; }
  #status.error { color: #e05c5c; }
</style>
</head>
<body>
<h1>VLM Parse</h1>
<p class="sub">Paste a screenshot with <span>Cmd+V</span> — text extracted locally with your GPU</p>

<div id="drop-zone">
  <p class="hint">Paste image here <span>(Cmd+V)</span></p>
  <p class="hint" style="margin-top:6px; font-size:12px;">or drag & drop a file</p>
</div>

<div id="result-box">
  <label>Extracted text</label>
  <textarea id="result" readonly></textarea>
  <div class="actions">
    <button class="primary" onclick="copyText()">Copy text</button>
    <button onclick="reset()">New image</button>
  </div>
</div>

<p id="status"></p>

<script>
const dropZone = document.getElementById("drop-zone");
const resultBox = document.getElementById("result-box");
const resultEl = document.getElementById("result");
const statusEl = document.getElementById("status");

document.addEventListener("paste", e => {
  const items = e.clipboardData.items;
  for (const item of items) {
    if (item.type.startsWith("image/")) {
      const file = item.getAsFile();
      processFile(file);
      break;
    }
  }
});

dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("active"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("active"));
dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("active");
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith("image/")) processFile(file);
});

dropZone.addEventListener("click", () => {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.onchange = e => processFile(e.target.files[0]);
  input.click();
});

function processFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const b64 = e.target.result;
    showPreview(b64);
    extractText(b64);
  };
  reader.readAsDataURL(file);
}

function showPreview(b64) {
  dropZone.classList.add("has-image");
  dropZone.innerHTML = `<img src="${b64}" alt="preview">`;
}

function extractText(b64) {
  setStatus("Extracting text...", "loading");
  resultBox.style.display = "none";

  fetch("/parse", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ image: b64 })
  })
  .then(r => r.json())
  .then(data => {
    resultEl.value = data.text;
    resultBox.style.display = "block";
    setStatus("Done", "done");
  })
  .catch(() => setStatus("Error connecting to server", "error"));
}

function copyText() {
  navigator.clipboard.writeText(resultEl.value);
  const btn = document.querySelector("button.primary");
  btn.textContent = "Copied!";
  setTimeout(() => btn.textContent = "Copy text", 1500);
}

function reset() {
  dropZone.classList.remove("has-image");
  dropZone.innerHTML = `<p class="hint">Paste image here <span>(Cmd+V)</span></p><p class="hint" style="margin-top:6px; font-size:12px;">or drag & drop a file</p>`;
  resultBox.style.display = "none";
  resultEl.value = "";
  setStatus("", "");
}

function setStatus(msg, cls) {
  statusEl.textContent = msg;
  statusEl.className = cls;
}
</script>
</body>
</html>
