<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VLM Parse — Local Document Extraction</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          surface: '#131315',
          'surface-lowest': '#0e0e10',
          'surface-low': '#1b1b1d',
          'surface-c': '#1f1f21',
          'surface-high': '#2a2a2c',
          ink: '#e4e2e4',
          'ink-dim': '#b9cacb',
          outline: '#3b494b',
          cyan: '#00f0ff',
          'cyan-soft': '#7df4ff',
          violet: '#b600f8',
          'violet-soft': '#ebb2ff',
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['"Geist Mono"', 'ui-monospace', '"SF Mono"', 'Menlo', 'monospace'],
        },
        maxWidth: { content: '1280px' },
      }
    }
  }
</script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-surface text-ink font-sans min-h-screen antialiased">

  <!-- Header -->
  <header class="border-b border-white/5">
    <div class="max-w-content mx-auto px-4 md:px-16 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2 font-mono text-sm font-semibold tracking-widest">
        <span class="text-cyan">◢</span> VLM PARSE
      </div>
      <div class="flex items-center gap-2 text-xs font-mono text-ink-dim">
        <span class="status-dot"></span> LOCAL · GPU
      </div>
    </div>
  </header>

  <main class="max-w-content mx-auto px-4 md:px-16 py-12 md:py-20">

    <!-- Hero -->
    <section class="text-center max-w-2xl mx-auto mb-12 md:mb-16">
      <h1 class="text-3xl md:text-5xl font-bold tracking-tight leading-tight mb-4">
        Document Extraction Engine
      </h1>
      <p class="text-ink-dim text-base leading-relaxed">
        Paste a screenshot with <kbd class="kbd">Cmd&nbsp;+&nbsp;V</kbd> — text extracted on your GPU.
        Nothing leaves your network.
      </p>
    </section>

    <!-- Grid: drop zone (8 cols) + results (4 cols) -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

      <!-- Drop zone -->
      <div id="drop-zone" class="dropzone lg:col-span-8 min-h-[340px] flex items-center justify-center cursor-pointer p-8">
        <div class="dz-inner text-center pointer-events-none">
          <div class="dz-icon mx-auto mb-5">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.6-3.6a2 2 0 0 0-2.8 0L6 20"/>
            </svg>
          </div>
          <p class="text-lg font-medium text-ink mb-1">Drop an image here</p>
          <p class="text-sm text-ink-dim mb-6">Paste (Cmd+V) · drag &amp; drop · PNG, JPG, WebP</p>
          <button type="button" class="btn-ghost pointer-events-auto">Select file</button>
        </div>
        <div class="scan-line"></div>
      </div>

      <!-- Results panel -->
      <aside id="result-box" class="panel lg:col-span-4 p-5 flex flex-col">
        <div class="flex items-center justify-between mb-3">
          <span class="font-mono text-xs font-semibold tracking-widest text-ink-dim">EXTRACTED TEXT</span>
          <button id="copy-btn" class="copy-btn font-mono text-xs flex items-center gap-1.5" onclick="copyText()" disabled>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
        </div>
        <textarea id="result" readonly placeholder="Waiting for input…"
          class="flex-1 min-h-[200px] w-full bg-surface-lowest border border-white/5 rounded-md p-4 font-mono text-[13px] leading-relaxed text-ink resize-none focus:outline-none focus:border-cyan/40"></textarea>
        <p id="status" class="font-mono text-xs mt-3 min-h-[1rem] text-ink-dim"></p>
      </aside>

    </div>

    <footer class="text-center mt-16 font-mono text-xs text-ink-dim/70 flex items-center justify-center gap-3">
      <span>⚡ In-device OCR</span><span>·</span><span>🔒 Private</span><span>·</span><span>qwen2.5vl:7b</span>
    </footer>

  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
